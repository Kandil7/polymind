name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Lint with Ruff
        run: poetry run ruff check src/ tests/

      - name: Type check with mypy
        run: poetry run mypy src/polymind/ || true

      - name: Run unit tests
        run: poetry run pytest tests/unit -v --tb=short

  eval-gate:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run eval harness (subset)
        run: |
          poetry run pytest tests/eval -v --tb=short \
            -k "test_eval_harness or test_benchmark" \
            --json-report \
            --json-report-file=eval_report.json

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report-${{ github.sha }}
          path: eval_report.json
